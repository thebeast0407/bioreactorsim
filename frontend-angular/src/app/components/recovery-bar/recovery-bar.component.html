<div class="bar idle" *ngIf="!prompt">
  <span class="idle-txt">No active recovery prompts</span>
</div>

<div class="bar active" *ngIf="prompt"
     [style.background]="urgent ? '#fef2f2' : '#fffbeb'"
     [style.border-color]="accentColor">
  <span class="icon">⚠</span>
  <div class="info">
    <span [style.color]="accentColor" class="fw">{{ prompt.fault_name }}</span>
    <span class="sep"> › </span>
    <span>{{ prompt.recovery_name }}</span>
    <span class="sep"> │ </span>
    <span [style.color]="accentColor" class="mono">auto-decline in {{ prompt.remaining_h.toFixed(1) }} h</span>
    <span class="muted mono"> (deadline t={{ prompt.deadline_h.toFixed(1) }} h)</span>
  </div>
  <div class="btns">
    <button class="btn-yes" (click)="apply()"   [disabled]="busy !== null">{{ busy==='apply'   ? '…' : '✓  Apply Recovery' }}</button>
    <button class="btn-no"  (click)="decline()" [disabled]="busy !== null">{{ busy==='decline' ? '…' : '✗  Decline' }}</button>
  </div>
</div>

<style>
.bar { display:flex; align-items:center; gap:10px; padding:7px 14px; border:1px solid; border-radius:8px; min-height:44px; transition:border-color .3s,background .3s; }
.idle { background:#f8fafc; border-color:#e2e8f0; }
.idle-txt { font-size:12px; color:#94a3b8; font-family:monospace; }
.icon { font-size:16px; flex-shrink:0; }
.info { flex:1; font-size:13px; display:flex; flex-wrap:wrap; align-items:center; gap:2px; }
.sep { color:#cbd5e1; }
.fw { font-weight:700; }
.mono { font-family:monospace; font-size:12px; }
.muted { color:#9ca3af; font-size:11px; }
.btns { display:flex; gap:8px; flex-shrink:0; }
.btn-yes, .btn-no { border:none; border-radius:6px; padding:5px 14px; font-size:12px; font-weight:600; cursor:pointer; }
.btn-yes { background:#dcfce7; color:#15803d; }
.btn-no  { background:#fee2e2; color:#b91c1c; }
.btn-yes:disabled, .btn-no:disabled { opacity:.5; cursor:not-allowed; }
</style>
